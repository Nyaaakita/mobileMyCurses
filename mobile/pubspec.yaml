name: lms_mobile
description: LMS mobile app with student/admin flows.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0
  connectivity_plus: ^6.1.0
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  device_calendar: ^4.3.3
  table_calendar: ^3.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#D6D9DE"
  adaptive_icon_foreground: assets/branding/app_icon.png
