openapi: 3.0.3
info:
  title: LMS API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      responses:
        "200":
          description: OK
  /api/v1/auth/login:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/register:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/refresh:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/auth/me:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/courses/{courseId}:
    get:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Course details and lesson summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetailsResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/lessons/{lessonId}:
    get:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: lessonId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lesson content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonResponse"
        "304":
          description: Not modified
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/courses:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Course list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseListItem"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/progress/courses/{courseId}:
    get:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Progress for course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseProgressResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/progress/batch:
    put:
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressBatchRequest"
      responses:
        "200":
          description: Accepted/rejected progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressBatchResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/quizzes/{quizId}:
    get:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: quizId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Quiz questions for attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResponse"
  /api/v1/quizzes/{quizId}/submit:
    post:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: quizId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSubmitRequest"
      responses:
        "200":
          description: Score result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizSubmitResponse"
  /api/v1/assignments/{assignmentId}/submit:
    post:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: assignmentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentSubmitRequest"
      responses:
        "200":
          description: Assignment check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentSubmitResponse"
  /api/v1/admin/courses:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All courses for admin
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseListItem"
    post:
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseListItem"
      responses:
        "201":
          description: Created course
  /api/v1/admin/courses/{courseId}:
    patch:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated course
    delete:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /api/v1/admin/courses/{courseId}/lessons:
    get:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lessons list
    post:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Lesson created
  /api/v1/admin/lessons/{lessonId}:
    patch:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: lessonId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lesson updated
    delete:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: lessonId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Lesson deleted
  /api/v1/admin/courses/{courseId}/lessons/reorder:
    patch:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reordered
  /api/v1/admin/lessons/{lessonId}/quiz:
    get:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: lessonId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lesson quiz
    post:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: lessonId
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Quiz created
  /api/v1/admin/quizzes/{quizId}:
    patch:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: quizId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quiz updated
    delete:
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: quizId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Quiz deleted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ErrorResponse:
      description: Unified error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [error_code, message, request_id]
      properties:
        error_code:
          type: string
        message:
          type: string
        details:
          nullable: true
        request_id:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 8
          maxLength: 72
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    AuthTokensResponse:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
    MeResponse:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [student, admin]
    CourseListItem:
      type: object
      required: [id, title, description, difficulty, estimated_minutes, content_version]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 3
          maxLength: 120
        description:
          type: string
          minLength: 10
          maxLength: 4000
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        estimated_minutes:
          type: integer
          minimum: 1
          maximum: 10000
        content_version:
          type: integer
          minimum: 1
        progress_percent:
          type: integer
    LessonSummary:
      type: object
      required: [id, title, order_index, status]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        order_index:
          type: integer
        status:
          type: string
          enum: [locked, available, done]
        content_version:
          type: integer
    CourseDetailsResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        cover_url:
          type: string
          nullable: true
        difficulty:
          type: string
        estimated_minutes:
          type: integer
        content_version:
          type: integer
        progress_percent:
          type: integer
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/LessonSummary"
    LessonResponse:
      type: object
      properties:
        id:
          type: string
        course_id:
          type: string
        title:
          type: string
        content_version:
          type: integer
        blocks:
          type: array
          items:
            type: object
    CourseProgressResponse:
      type: object
      properties:
        course_id:
          type: string
        progress_percent:
          type: integer
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/LessonSummary"
    ProgressBatchRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: "#/components/schemas/ProgressItem"
    ProgressItem:
      type: object
      required: [lesson_id, status, updated_at, client_event_id]
      properties:
        lesson_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [started, completed]
        score:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        answers:
          type: object
          nullable: true
        updated_at:
          type: string
          format: date-time
        client_event_id:
          type: string
          format: uuid
    ProgressBatchResponse:
      type: object
      required: [accepted, rejected]
      properties:
        accepted:
          type: array
          items:
            type: string
            format: uuid
        rejected:
          type: array
          items:
            type: object
    QuizResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        questions:
          type: array
          items:
            type: object
    QuizSubmitRequest:
      type: object
      properties:
        answers:
          type: array
          items:
            type: object
    QuizSubmitResponse:
      type: object
      properties:
        score:
          type: integer
        max_score:
          type: integer
        passed:
          type: boolean
    AssignmentSubmitRequest:
      type: object
      required: [answer_text]
      properties:
        answer_text:
          type: string
    AssignmentSubmitResponse:
      type: object
      properties:
        status:
          type: string
        score:
          type: integer
          nullable: true
        feedback:
          type: string
